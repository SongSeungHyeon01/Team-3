version: "3.9"
services:
  backend:
    build: ../backend
    ports: ["8000:8000"]
    volumes: ["../storage:/app/storage"]
    env_file: ../backend/.env
  frontend:
    build: ../frontend
    ports: ["3000:3000"]
    depends_on: [backend]
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    command: serve
volumes:
  ollama_data:
